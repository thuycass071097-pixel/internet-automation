# .github/workflows/playwright-with-ai.yml

name: Playwright Tests + AI Issue Creator

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ===== JOB 1: CHẠY TESTS =====
  test:
    runs-on: ubuntu-latest
    # Lưu exit code để job 2 biết có fail không
    outputs:
      test_failed: ${{ steps.run_tests.outputs.failed }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cài dependencies
        run: npm ci

      - name: Cài Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Chạy Playwright tests
        id: run_tests
        # continue-on-error: true để job không dừng, job 2 vẫn chạy
        continue-on-error: true
        run: |
          set +e
          npx playwright test \
            --reporter=list \
            --reporter=json:test-results.json \
            --reporter=html
          status=$?
          set -e
          echo "failed=$status" >> $GITHUB_OUTPUT
          exit $status

      - name: Upload test artifacts
        if: always()   # Luôn upload dù pass hay fail
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            test-results.json
            playwright-report/
            test-results/
          retention-days: 7

  # ===== JOB 2: TẠO ISSUE NẾU CÓ FAIL =====
  create-issues:
    runs-on: ubuntu-latest
    needs: test
    # Chỉ chạy khi job test có failure
    if: needs.test.outputs.test_failed != '0'

    # Cần quyền để tạo issue
    permissions:
      issues: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Download test artifacts
        uses: actions/download-artifact@v4
        with:
          name: playwright-results

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cài Python dependencies
        run: pip install anthropic

      - name: Tạo GitHub Issues từ failures
        env:
          # Lấy từ GitHub Secrets (Settings → Secrets → Actions)
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # GH_TOKEN do GitHub tự cung cấp — không cần thêm vào Secrets
          GH_TOKEN: ${{ github.token }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
        run: python scripts/create_issue_from_failure.py

      - name: Post summary lên job
        if: always()
        run: |
          echo "## 🤖 AI Issue Creator Summary" >> $GITHUB_STEP_SUMMARY
          echo "Đã xử lý test failures và tạo GitHub Issues tự động." >> $GITHUB_STEP_SUMMARY
          echo "Kiểm tra tab Issues của repo để xem kết quả." >> $GITHUB_STEP_SUMMARY